  - icon: doc
    title: 3-Month Content Plan
    body: Monthly publishing roadmap so your AI visibility keeps compounding instead of going stale.
  - icon: person
    title: Direct Access to Mark
    body: You're working with the founder, not a ticket queue. 90 days of post-launch support included.
faqHeadline: Common Questions
faqs:
  - q: What does 'AI-Ready Website' actually mean?
    a: >-
      Three things working together. (1) Content written for AEO — Answer Engine Optimization — so
      ChatGPT, Perplexity, and Google AI Overviews can cleanly extract and cite your answers. (2)
      Schema markup (FAQ, LocalBusiness, Service, Review) so AI engines understand what you do,
      where, and for whom. (3) Local AI graph presence — Google Business Profile, Apple Maps, Bing,
      plus the citation network those AI engines pull from. Most small business sites have none of
      this.
  - q: How is this different from regular SEO?
    a: >-
      Regular SEO optimizes for Google's classic 10-blue-links results. AEO optimizes for AI engines
      that read your content and answer the question themselves — often without sending the user to
      your site at all. The user just sees you cited or recommended. I do both, because Google still
      matters, but AI search is now where your future best customers are starting their search.
  - q: Will I lose my current Google rankings?
    a: >-
      No — almost the opposite. The structured data, fast modern stack, and AEO content I add
      typically improve your classic Google rankings too. I do a careful rankings baseline before
      launch and protect everything that's already ranking. If anything dips, I fix it.
  - q: How long until I show up in ChatGPT / Perplexity / AI Overviews?
    a: >-
      AI engines update their indexes on different cadences. You'll usually see Perplexity changes
      within days, AI Overviews within 2-4 weeks, and ChatGPT model updates more gradually. I
      monitor your visibility through the 90-day post-launch period and refine the AEO content as
      the engines respond.
  - q: Do I have to migrate off my current platform?
    a: >-
      Usually yes — most existing sites (Wix, Squarespace, GoDaddy builders) make the schema and
      performance work I need to do impossible. I rebuild on a modern stack you fully own. You'll
      still be able to edit your content easily after launch — I set you up with a content editor
      for ongoing updates.
  - q: What about my domain, email, and existing content?
    a: >-
      All preserved. I migrate your content (improving it for AEO), keep your domain on its current
      registrar, and don't touch your email setup. There's a brief DNS cutover at launch — usually
      5-15 minutes of overlap, no downtime.
  - q: What's included in the 90 days post-launch?
    a: >-
      AI search visibility monitoring, content refinements as I see what's getting cited, schema
      tweaks, GBP optimization, and direct access to me for any questions. After 90 days, optional
      ongoing optimization is available, but most clients are in good shape on their own by then.

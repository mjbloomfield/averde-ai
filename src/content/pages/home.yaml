aboutEyebrow: 'Why work with me'
aboutHeadline: "I'm not a consultant who learned AI last year."
aboutBio1: 'I spent years as a composites research engineer and sustainability consultant before the AI wave hit. When I saw what it could do for small businesses — not the hype, the actual practical tools — I built Averde to make it accessible.'
aboutBio2: "Every client works directly with me. I figure out what you actually need, skip the things you don't, and build or deploy it fast. Based in Boulder, CO. Working with businesses everywhere."


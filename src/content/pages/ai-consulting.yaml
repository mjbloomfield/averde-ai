seoTitle: AI Consulting for Small Business | Free Readiness Audit | Averde AI
seoDescription: >-
  Start with the free 3-minute AI Business Readiness Audit — a scored report on where AI can hand
  you hours back — then a free 30-minute call to turn it into a plan.
heroBadge: Free audit · Free 30-minute call · No pressure
heroHeadline: Put AI to work in how you run the business.
heroDek: >-
  The website audit covers how AI sees you. This is the other half: where AI can take real work off
  your plate — quoting, follow-up, scheduling, the same questions answered over and over. It starts
  with a free readiness audit, and the report becomes the agenda for a free 30-minute call.
funnel:
  - title: Run the free readiness audit
    body: >-
      Five steps, about three minutes. It scores your answers — where your hours go, what systems
      you run on, where you are with AI today — and shows the rough math on hours AI could hand
      back.
  - title: Book the free 30-minute call
    body: >-
      Your report is the agenda. We walk through your answers, pressure-test the numbers, and pick
      your two or three highest-payback moves. You leave with a plan, whether or not you hire me for
      any of it.
  - title: Build only what earns its keep
    body: >-
      If there's paid work worth doing — a strategy session, a custom build, an AI-Ready website —
      you'll know exactly what it is and why. If the plan is all DIY, that's a fine outcome too.
auditEyebrow: Start here
auditHeadline: The AI Business Readiness Audit
auditDek: >-
  A structured self-assessment — it scores your answers, no scan, no made-up numbers. Your report is
  emailed to you and becomes the prep for the free call.
offerEyebrow: Skip a step · $27
offerTitle: Claude, set up in your voice this week
offerBody: >-
  The single highest-leverage five minutes in any Claude setup is the Instructions file — the
  standing brief that makes every chat start out knowing your business and how you write. For $27,
  fill out a 10-minute survey and I'll write yours personally — not a bot, not a template.
offerCta: Get your Custom Instructions file →
bookEyebrow: The free 30-minute call
bookHeadline: Ready to walk through your report?
bookDek: >-
  Pick a time below. Bring your readiness report (I'll have a copy too) and we'll turn it into next
  steps you can act on.
bookCardTitle: Book your free 30-minute call
bookCardSub: Pick a time that works for you — I'll confirm by email.

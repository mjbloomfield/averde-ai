<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Visibility Audit | Averde AI</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;500;600&family=Source+Serif+4:wght@400;500;600&family=Inter+Tight:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --honey-50:#F6E8D0; --honey-100:#E8C896; --honey-300:#C99356; --honey-500:#9C6A33; --honey-700:#6B4520;
    --walnut-300:#7A5238; --walnut-500:#4F3522; --walnut-700:#2A1B11;
    --bone:#E5DBC9; --driftwood:#B7A990; --smoke:#7B6E5B;
    --paper:#F4ECDB; --ink:#1F1A12; --ink-700:#48392A; --muted:#7A6A58;
    --aged-cream:#EDE3D0;
    --rust:#A86237;
    --pass:#3a6f4d; --warn:#9C6A33; --fail:#A04324;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--paper); color:var(--ink); font-family:'Source Serif 4',Georgia,serif; font-size:16px; line-height:1.55; }
  h1,h2,h3,h4 { font-family:'Fraunces',Georgia,serif; letter-spacing:-0.02em; line-height:1.15; font-weight:500; margin:0; }
  p { margin:0; }
  .shell { min-height:100vh; padding:40px 16px 64px; }
  .shell-inner { max-width:680px; margin:0 auto; }
  .shell-inner.wide { max-width:880px; }
  .wordmark { text-align:center; margin-bottom:32px; font-family:'Fraunces',serif; font-size:24px; color:var(--walnut-700); font-weight:500; letter-spacing:-0.02em; }
  .wordmark span { color:var(--honey-500); }
  .card { background:#fff; border:1px solid var(--bone); border-radius:24px; padding:32px; }
  @media (min-width:640px){ .card { padding:48px; } }
  .fade-in { animation: fadeIn 0.35s ease both; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px);} to { opacity:1; transform:translateY(0);} }

  .eyebrow { font-family:'Inter Tight',sans-serif; font-size:11px; font-weight:600; color:var(--honey-500); text-transform:uppercase; letter-spacing:0.14em; margin-bottom:12px; }
  .label { font-family:'Inter Tight',sans-serif; font-size:13px; font-weight:600; color:var(--ink-700); text-transform:uppercase; letter-spacing:0.08em; display:block; margin-bottom:8px; }
  .hint { font-size:14px; color:var(--smoke); margin-top:8px; }
  .dek { color:var(--muted); font-size:18px; margin:12px 0 32px; }

  .brand-btn { background:var(--walnut-700); color:var(--paper); border:0; border-radius:12px; padding:14px 28px; font-family:'Inter Tight',sans-serif; font-weight:600; font-size:14px; letter-spacing:0.01em; cursor:pointer; transition:background 0.18s; }
  .brand-btn:hover { background:var(--walnut-500); }
  .brand-btn:disabled { opacity:0.4; cursor:not-allowed; }
  .ghost-btn { background:none; border:0; color:var(--ink-700); font-family:'Inter Tight',sans-serif; font-weight:500; font-size:14px; cursor:pointer; padding:8px 0; }
  .ghost-btn:hover { color:var(--walnut-700); }
  .step-footer { display:flex; align-items:center; justify-content:space-between; padding-top:24px; margin-top:32px; border-top:1px solid var(--bone); }

  .input { background:#fff; border:1.5px solid var(--driftwood); border-radius:10px; padding:13px 16px; width:100%; font-family:'Source Serif 4',serif; font-size:16px; color:var(--ink); transition:border 0.15s; }
  .input:focus { outline:none; border-color:var(--honey-300); }
  textarea.input { resize:vertical; }
  select.input { appearance:none; background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%237B6E5B' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>"); background-repeat:no-repeat; background-position:right 16px center; padding-right:40px; }
  .field-grid { display:grid; grid-template-columns:1fr; gap:20px; }
  @media (min-width:640px){ .field-grid { grid-template-columns:1fr 1fr; } }

  .progress-wrap { margin-bottom:32px; }
  .progress-labels { display:flex; justify-content:space-between; margin-bottom:8px; }
  .progress-labels span { font-family:'Inter Tight',sans-serif; font-size:13px; font-weight:600; color:var(--ink-700); text-transform:uppercase; letter-spacing:0.08em; }
  .progress { background:var(--bone); height:4px; border-radius:99px; overflow:hidden; }
  .progress-bar { background:var(--honey-300); height:100%; transition:width 0.4s ease; }

  .check-row { display:flex; align-items:flex-start; gap:12px; padding:14px 16px; border:1.5px solid var(--bone); border-radius:12px; cursor:pointer; transition:all 0.15s; background:#fff; }
  .check-row:hover { border-color:var(--honey-300); }
  .check-row.selected { border-color:var(--walnut-700); background:var(--aged-cream); }
  .check-box { flex-shrink:0; width:20px; height:20px; border:1.5px solid var(--driftwood); border-radius:5px; margin-top:2px; display:flex; align-items:center; justify-content:center; }
  .check-row.selected .check-box { background:var(--walnut-700); border-color:var(--walnut-700); }
  .pains-grid { display:grid; grid-template-columns:1fr; gap:12px; }
  @media (min-width:640px){ .pains-grid { grid-template-columns:1fr 1fr; } }

  /* Report styles */
  .report-head { text-align:center; margin-bottom:40px; }
  .report-head h1 { font-size:clamp(2rem,5vw,3rem); margin:8px 0; }
  .report-sub { color:var(--muted); font-size:18px; }

  .score-panel { background:#fff; border:1px solid var(--bone); border-radius:24px; padding:32px; display:flex; flex-direction:column; gap:24px; align-items:center; margin-bottom:24px; }
  @media (min-width:640px){ .score-panel { flex-direction:row; padding:40px; } }
  .score-ring-wrap { position:relative; width:140px; height:140px; flex-shrink:0; }
  .score-ring-wrap svg circle.arc { stroke-linecap:round; transform:rotate(-90deg); transform-origin:center; transition:stroke-dashoffset 0.8s ease; }
  .score-ring-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .score-ring-num { font-family:'Fraunces',serif; font-size:36px; font-weight:500; }
  .score-ring-grade { font-family:'Inter Tight',sans-serif; font-size:12px; font-weight:600; }
  .score-copy h2 { font-size:26px; margin-bottom:10px; }
  .score-copy p { color:var(--muted); }
  .score-basis { font-family:'Inter Tight',sans-serif; font-size:12px; color:var(--smoke); margin-top:10px; }

  .section-block { background:#fff; border:1px solid var(--bone); border-radius:20px; padding:28px; margin-bottom:24px; }
  @media (min-width:640px){ .section-block { padding:32px; } }
  .section-block h3 { font-size:22px; margin-bottom:6px; }
  .section-block > .section-dek { color:var(--muted); font-size:15px; margin-bottom:20px; }

  .checks-table { display:flex; flex-direction:column; }
  .check-item { border-top:1px solid var(--bone); }
  .check-item:first-child { border-top:0; }
  .check-item summary { list-style:none; display:flex; align-items:center; gap:12px; padding:13px 4px; cursor:pointer; }
  .check-item summary::-webkit-details-marker { display:none; }
  .check-status { flex-shrink:0; width:22px; height:22px; border-radius:999px; display:flex; align-items:center; justify-content:center; font-size:12px; color:#fff; font-family:'Inter Tight',sans-serif; font-weight:700; }
  .check-status.pass { background:var(--pass); } .check-status.warn { background:var(--warn); }
  .check-status.fail { background:var(--fail); } .check-status.na { background:var(--driftwood); }
  .check-name { flex:1; font-size:15px; color:var(--ink); }
  .check-pts { font-family:'Inter Tight',sans-serif; font-size:12px; font-weight:600; color:var(--smoke); white-space:nowrap; }
  .check-chevron { color:var(--driftwood); transition:transform 0.15s; font-size:12px; }
  .check-item[open] .check-chevron { transform:rotate(180deg); }
  .check-detail { padding:2px 4px 16px 34px; font-size:14px; color:var(--ink-700); }
  .check-detail .why { margin-bottom:8px; }
  .check-detail .fix { background:var(--aged-cream); border-radius:8px; padding:10px 14px; }
  .check-detail .fix strong { font-family:'Inter Tight',sans-serif; font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:var(--honey-500); display:block; margin-bottom:4px; }

  .vis-results { display:flex; flex-direction:column; gap:8px; margin:16px 0; }
  .vis-hit { border-radius:10px; padding:10px 14px; background:var(--aged-cream); }
  .vis-hit.you { background:rgba(58,111,77,.12); border:1px solid rgba(58,111,77,.4); }
  .vis-hit .t { font-family:'Inter Tight',sans-serif; font-size:14px; font-weight:600; color:var(--ink); }
  .vis-hit .h { font-size:12px; color:var(--smoke); margin-top:2px; }
  .vis-badge { display:inline-block; font-family:'Inter Tight',sans-serif; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; padding:5px 12px; border-radius:999px; margin-bottom:12px; }
  .vis-badge.good { background:rgba(58,111,77,.12); color:var(--pass); }
  .vis-badge.bad  { background:rgba(160,67,36,.12); color:var(--fail); }
  .vis-queries { display:flex; flex-direction:column; gap:8px; margin:16px 0; }
  .vis-q { border:1px solid var(--bone); border-radius:10px; background:var(--paper); }
  .vis-q summary { display:flex; align-items:center; gap:10px; padding:10px 14px; cursor:pointer; list-style:none; }
  .vis-q summary::-webkit-details-marker { display:none; }
  .vis-q-mark { font-weight:700; flex-shrink:0; }
  .vis-q-mark.good { color:var(--pass); }
  .vis-q-mark.bad { color:var(--fail); }
  .vis-q-text { font-family:'Inter Tight',sans-serif; font-size:14px; font-weight:600; color:var(--ink); flex:1; }
  .vis-q .vis-results { margin:0; padding:0 14px 12px; }
  .vis-q[open] .check-chevron { transform:rotate(180deg); }

  .plan-list { display:flex; flex-direction:column; gap:16px; }
  .plan-item { border:1px solid var(--bone); border-radius:16px; padding:22px; background:#fff; }
  .plan-num { font-family:'Fraunces',serif; font-size:26px; color:var(--driftwood); }
  .plan-item h4 { font-size:19px; margin:6px 0 8px; }
  .plan-item .why { font-size:14.5px; color:var(--ink-700); margin-bottom:14px; }
  .plan-diy { background:var(--aged-cream); border-radius:10px; padding:14px 16px; font-size:14px; color:var(--ink-700); }
  .plan-diy strong, .plan-short strong { font-family:'Inter Tight',sans-serif; font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:var(--honey-500); display:block; margin-bottom:6px; }
  .plan-diy ul { margin:0; padding-left:18px; } .plan-diy li { margin-bottom:4px; }
  .plan-short { margin-top:10px; font-size:14px; color:var(--ink-700); padding:0 16px; }

  .cta-panel { background:var(--walnut-700); color:var(--paper); border-radius:24px; padding:40px 28px; text-align:center; margin-top:32px; }
  .cta-panel h2 { color:var(--paper); font-size:clamp(1.6rem,3.5vw,2.2rem); margin-bottom:12px; }
  .cta-panel p { color:var(--bone); max-width:520px; margin:0 auto 24px; }
  .cta-btn { display:inline-block; background:var(--honey-300); color:var(--walnut-700); font-family:'Inter Tight',sans-serif; font-weight:600; font-size:15px; padding:15px 30px; border-radius:12px; text-decoration:none; }
  .cta-note { font-size:13px; color:var(--driftwood); margin-top:16px; }

  .pending { display:flex; align-items:center; gap:10px; color:var(--muted); font-size:14px; padding:14px 0; }
  .spinner { width:16px; height:16px; border:2px solid var(--bone); border-top-color:var(--honey-500); border-radius:999px; animation:spin 0.8s linear infinite; flex-shrink:0; }
  .live-strip { display:flex; align-items:center; gap:10px; font-size:13.5px; color:var(--muted); background:var(--bone); border-radius:10px; padding:10px 14px; margin-bottom:22px; }
  .live-strip.done { color:var(--ink-700); }
  .live-strip .tick { color:#3a6f4d; font-weight:700; flex-shrink:0; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .restart { text-align:center; margin-top:28px; }
</style>
</head>
<body>
<div class="shell"><div class="shell-inner" id="shell">
  <div class="wordmark">Averde<span>.</span></div>
  <div id="root"></div>
</div></div>

<script>
(function () {
'use strict';

/* ================================================================
   AI Visibility Audit — honest version.
   Everything scored comes from a verifiable check: we fetch the
   user's live site (/api/site-audit) and run real AI-search queries
   (/api/ai-visibility). Self-reported answers only shape the action
   plan — they never move the score.
================================================================ */

const INDUSTRIES = [
  'Dental practice','HVAC / Heating & Cooling','Real estate brokerage',
  'Med spa / Aesthetic medicine','Veterinary clinic','Law firm',
  'Home services (plumbing, roofing, landscaping)','Auto repair / Body shop',
  'Restaurant / Hospitality','Fitness / Gym',
  'Accounting / Financial advisor','Construction / Contractor',
  'E-commerce / DTC brand','Other'
];

const PAIN_POINTS = [
  { id:'visibility', label:"Competitors show up online when we don't" },
  { id:'calls',      label:'Phone calls going unanswered' },
  { id:'leads',      label:'Lead follow-up dropping through the cracks' },
  { id:'data',       label:'Manual data entry between systems' },
  { id:'questions',  label:'Same customer questions answered over and over' },
  { id:'quotes',     label:'Quoting / proposal writing takes too long' },
  { id:'scheduling', label:'Scheduling complexity, no-shows, or double-bookings' },
  { id:'content',    label:'Content & marketing creation eats my time' },
  { id:'reporting',  label:"No clear visibility into what's actually working" },
];

const GOALS = [
  'Get more qualified leads',
  'Free up my time / reduce admin',
  'Win more deals from existing leads',
  'Just understand what AI can actually do for us',
];

// ---------------- state ----------------
const state = {
  step: 0,
  name: '', website: '', industry: '', city: '',
  keywords: '',
  pains: [], goal: '',
  contactName: '', email: '',
  siteAudit: null,     // null = not fetched yet; {pending:true} = in flight
  aiVisibility: null,
  siteFired: false,
  visFired: false,
  sendStatus: 'idle',  // idle | sending | sent | failed
};

const TOTAL_STEPS = 4; // basics, keywords, pains, email

// ---------------- real-signal fetches ----------------
// The site scan starts as soon as we have a URL (end of step 1); the
// Perplexity queries wait for step 2 so they can use the user's own
// customer search phrases instead of a generic industry label.
function fireSiteCheck() {
  if (state.siteFired) return;
  state.siteFired = true;

  if (state.website && state.website.length > 3) {
    state.siteAudit = { pending: true };
    fetch('/api/site-audit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: state.website }),
    })
      .then(r => (r.ok ? r.json() : null))
      .then(r => { state.siteAudit = r || { reachable: false }; checksProgressed(); })
      .catch(() => { state.siteAudit = { reachable: false }; checksProgressed(); });
  }
}

function parseKeywords() {
  return state.keywords
    .split(/[\n,;]+/)
    .map(k => k.trim())
    .filter(k => k.length > 2)
    .slice(0, 10);
}

function fireVisibilityCheck() {
  if (state.visFired) return;
  state.visFired = true;

  if (state.industry && state.city) {
    state.aiVisibility = { pending: true };
    fetch('/api/ai-visibility', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        industry: state.industry, city: state.city,
        domain: state.website || '', name: state.name || '',
        keywords: parseKeywords(),
      }),
    })
      .then(r => (r.ok ? r.json() : null))
      .then(r => { state.aiVisibility = r || { configured: false }; checksProgressed(); })
      .catch(() => { state.aiVisibility = { configured: false }; checksProgressed(); });
  }
}

function checksProgressed() {
  if (state.step === TOTAL_STEPS + 1) { render(); return; }
  // Mid-form: refresh the background-status strip in place, without
  // re-rendering the step (which would clobber focus / in-progress typing).
  const strip = document.getElementById('live-strip');
  if (strip) strip.outerHTML = liveStatusStrip();
}

function liveStatusStrip() {
  if (!state.siteFired && !state.visFired) return '';
  const busy = (state.siteAudit && state.siteAudit.pending) || (state.aiVisibility && state.aiVisibility.pending);
  const parts = [];
  if (state.siteAudit) parts.push(state.siteAudit.pending ? `scanning ${esc(state.website)}` : `scanned ${esc(state.website)}`);
  if (state.aiVisibility) parts.push(state.aiVisibility.pending ? 'running your search terms through a live AI engine' : 'AI-search queries done');
  return `<div class="live-strip${busy ? '' : ' done'}" id="live-strip">
    ${busy ? '<div class="spinner"></div>' : '<span class="tick">✓</span>'}
    <span>${busy
      ? `Working in the background: ${parts.join(' and ')}. Your report is being built while you finish.`
      : 'Live checks complete — your full report is ready on the final screen.'}</span>
  </div>`;
}

/* ================================================================
   Scoring — a transparent checklist. Every check names its evidence,
   its points, and its fix. Checks that couldn't run are excluded
   from the denominator instead of silently counting against you.
   status: pass | warn | fail | na
================================================================ */
function buildChecks() {
  const sa = state.siteAudit && !state.siteAudit.pending ? state.siteAudit : null;
  const av = state.aiVisibility && !state.aiVisibility.pending ? state.aiVisibility : null;
  const platform = sa && sa.platform ? sa.platform : null;
  const hosting = sa && sa.hosting ? sa.hosting : null;
  const noSite = !state.website || state.website.length <= 3;

  // Platform-aware fix note for schema checks. Platform (the builder you edit
  // in) drives the instructions; hosting fills in when no builder is detected.
  const schemaHow = (() => {
    if (/squarespace/i.test(platform || '')) return 'On Squarespace: Settings → Advanced → Code Injection (Business plan or higher). Ask Claude or ChatGPT to “write LocalBusiness JSON-LD schema for my business”, paste the result into the Header box, then check it at validator.schema.org.';
    if (/wordpress/i.test(platform || '')) return 'On WordPress: install Yoast SEO or Rank Math — both generate LocalBusiness and FAQ schema from a settings screen, no code needed.';
    if (/wix/i.test(platform || '')) return 'On Wix: Settings → SEO → Structured Data (or per-page SEO panel → Advanced → Structured Data). Ask Claude or ChatGPT to generate the JSON-LD, paste it in, then check it at validator.schema.org.';
    if (/shopify/i.test(platform || '')) return 'On Shopify: many themes include basic schema. Add LocalBusiness/FAQ JSON-LD via a small snippet in theme.liquid, or use an SEO app like Smart SEO.';
    if (/webflow/i.test(platform || '')) return 'On Webflow: Page settings → Custom code → Head code (needs a paid site plan). Ask Claude or ChatGPT to generate the JSON-LD, paste it in, then check it at validator.schema.org.';
    if (/framer/i.test(platform || '')) return 'On Framer: Site Settings → General → Custom Code → Start of head tag. Ask Claude or ChatGPT to generate the JSON-LD, paste it in, then check it at validator.schema.org.';
    if (/hubspot/i.test(platform || '')) return 'On HubSpot: Settings → Website → Pages → site header HTML. Ask Claude or ChatGPT to generate the JSON-LD, paste it in, then check it at validator.schema.org.';
    if (/godaddy|duda/i.test(platform || '')) return `Your platform (${platform}) doesn’t allow custom code on most plans — this is one of the checks that usually requires a rebuild on a platform you control.`;
    if (/ghost/i.test(platform || '')) return 'On Ghost: Settings → Code injection → Site header. Ask Claude or ChatGPT to generate the JSON-LD, paste it in, then check it at validator.schema.org.';
    if (platform) return 'Add a JSON-LD script block to your site’s <head>. Ask Claude or ChatGPT to generate it for your business, then check it at validator.schema.org.';
    if (hosting) return `Your site looks custom-built (served by ${hosting}), which is good news — whoever maintains it can add the JSON-LD block straight into the site’s <head>. It’s a 15-minute task; Claude or ChatGPT can generate the block.`;
    return 'Ask whoever manages your site (or an AI assistant like Claude) to generate the JSON-LD block, then paste it into your site’s header code injection.';
  })();

  const checks = [];
  const add = (id, name, status, points, max, evidence, why, fix) =>
    checks.push({ id, name, status, points, max, evidence, why, fix });

  // --- Site checks ---
  if (noSite) {
    add('site', 'Website checks', 'na', 0, 0,
      'No website provided.',
      'Without a website there’s nothing for AI engines to read, cite, or recommend — it’s the single biggest gap.',
      'Getting a simple, well-structured site online is step one. Even 5 good pages beats none.');
  } else if (!sa) {
    add('site', 'Website checks', 'na', 0, 0, 'Still analyzing…', '', '');
  } else if (!sa.reachable) {
    add('reachable', 'Site reachable', 'fail', 0, 5,
      'We couldn’t load your site.',
      'If our checker can’t reach it, AI crawlers likely can’t either — nothing else matters until this works.',
      'Confirm the address is right and the site loads over https:// in a private browser window. If it loads for you but not for bots, ask your host about firewall/bot-blocking settings.');
  } else {
    add('reachable', 'Site loads over HTTPS', sa.https === false ? 'warn' : 'pass', sa.https === false ? 2 : 5, 5,
      sa.https === false ? 'Site loads, but not over HTTPS.' : 'Loads correctly over a secure connection.',
      'AI engines and Google both treat non-HTTPS sites as second-class.',
      'Your host can enable a free SSL certificate — usually one toggle.');

    const t = sa.title || '';
    const titleOk = t.length >= 10 && t.length <= 70;
    add('title', 'Page title describes the business', titleOk ? 'pass' : (t ? 'warn' : 'fail'), titleOk ? 5 : (t ? 2 : 0), 5,
      t ? `Found: “${t.slice(0, 90)}”` : 'No title tag found.',
      'The title is the first thing every engine reads. “Home” or your bare business name wastes it.',
      'Format: “What you do in Plain English | Business Name — City, ST”. Every platform lets you edit this under page settings or SEO settings.');

    add('desc', 'Meta description present', sa.description ? 'pass' : 'fail', sa.description ? 5 : 0, 5,
      sa.description ? 'Found a meta description.' : 'No meta description found.',
      'It’s the summary engines fall back on when deciding what your page is about.',
      'Write 1–2 sentences saying what you do, for whom, and where. Add it in your platform’s SEO settings for the homepage.');

    add('h1', 'Clear main heading (H1)', sa.h1Count === 1 ? 'pass' : (sa.h1Count > 1 ? 'warn' : 'fail'), sa.h1Count === 1 ? 5 : (sa.h1Count > 1 ? 3 : 0), 5,
      sa.h1Count === 1 ? 'Exactly one H1 heading — correct.' : sa.h1Count > 1 ? `${sa.h1Count} H1 headings found (should be one).` : 'No H1 heading found.',
      'The H1 tells engines what the page is about in one line. Zero or many H1s muddies that signal.',
      'Make your main headline the H1, and say what you do + where — not just a slogan.');

    const present = (sa.schema && sa.schema.present) || [];
    const has = n => present.indexOf(n) !== -1;
    const foundOn = (sa.schema && sa.schema.foundOn) || {};
    const scanned = (sa.schema && sa.schema.pagesScanned) || ['/'];
    const onPage = n => foundOn[n] && foundOn[n] !== '/' ? ' (on ' + foundOn[n] + ')' : '';
    const notFound = what => 'No ' + what + ' markup found on the ' + scanned.length + ' page' + (scanned.length === 1 ? '' : 's') + ' we checked.';
    add('schema-local', 'LocalBusiness schema', has('LocalBusiness') ? 'pass' : 'fail', has('LocalBusiness') ? 15 : 0, 15,
      has('LocalBusiness') ? 'Found LocalBusiness (or a subtype) markup' + onPage('LocalBusiness') + '.' : notFound('LocalBusiness'),
      'This is the machine-readable card that tells AI engines your name, location, and what kind of business you are. It’s the highest-value single block of code on a local business site.',
      schemaHow);

    add('schema-faq', 'FAQ schema', has('FAQPage') ? 'pass' : 'fail', has('FAQPage') ? 10 : 0, 10,
      has('FAQPage') ? 'Found FAQPage markup' + onPage('FAQPage') + '.' : notFound('FAQPage'),
      'AI engines love clean question-and-answer pairs — FAQ schema is the easiest content for them to quote directly.',
      'First write a real FAQ page (the 8–15 questions customers actually ask). Then mark it up: ' + schemaHow);

    add('schema-service', 'Service schema', has('Service') ? 'pass' : 'fail', has('Service') ? 5 : 0, 5,
      has('Service') ? 'Found Service markup' + onPage('Service') + '.' : notFound('Service'),
      'Tells engines exactly which services you offer, so “who does X near me” queries can match you.',
      'One Service block per major service you offer. ' + schemaHow);

    add('sitemap', 'sitemap.xml', sa.files && sa.files.sitemap ? 'pass' : 'fail', sa.files && sa.files.sitemap ? 5 : 0, 5,
      sa.files && sa.files.sitemap ? 'Found /sitemap.xml.' : 'No /sitemap.xml found.',
      'The index crawlers use to find all your pages. Without it, deeper pages may never get read.',
      'Most platforms generate one automatically — check yoursite.com/sitemap.xml. On WordPress, Yoast/Rank Math handles it.');

    add('robots', 'robots.txt', sa.files && sa.files.robots ? 'pass' : 'fail', sa.files && sa.files.robots ? 5 : 0, 5,
      sa.files && sa.files.robots ? 'Found /robots.txt.' : 'No /robots.txt found.',
      'Tells crawlers (including AI crawlers) what they may read. A missing file is a small but easy fix.',
      'Most platforms generate this automatically. If yours doesn’t, add a robots.txt that allows crawling and points to your sitemap.');

    add('llms', 'llms.txt', sa.files && sa.files.llms ? 'pass' : 'fail', sa.files && sa.files.llms ? 5 : 0, 5,
      sa.files && sa.files.llms ? 'Found /llms.txt.' : 'No /llms.txt found.',
      'A new convention: a plain-text summary of your business written specifically for AI models. Very few small businesses have one — easy differentiation.',
      'Write a short markdown file describing your business, services, and key pages, and host it at yoursite.com/llms.txt. Ask Claude to draft it from your homepage.');

    const ps = sa.pagespeed;
    if (ps && ps.performance != null) {
      const perf = ps.performance;
      add('perf', 'Mobile speed (Google PageSpeed)', perf >= 80 ? 'pass' : perf >= 50 ? 'warn' : 'fail', perf >= 80 ? 10 : perf >= 50 ? 5 : 0, 10,
        `Scored ${perf}/100 on Google’s mobile performance test.`,
        'Slow sites get crawled less and abandoned more. Most site-builder templates score poorly out of the box.',
        'Compress images (biggest win — aim under 300KB each), remove unused plugins/scripts. If your template itself is slow, that’s a rebuild conversation.');
    } else {
      add('perf', 'Mobile speed (Google PageSpeed)', 'na', 0, 0, 'Speed test didn’t complete in time — not counted against you.', '', 'Run it yourself free at pagespeed.web.dev.');
    }
    if (ps && ps.seo != null) {
      const seo = ps.seo;
      add('seo', 'Technical SEO basics (Google PageSpeed)', seo >= 90 ? 'pass' : seo >= 70 ? 'warn' : 'fail', seo >= 90 ? 10 : seo >= 70 ? 5 : 0, 10,
        `Scored ${seo}/100 on Google’s SEO checks.`,
        'Covers crawlability fundamentals: valid links, alt text, indexing directives.',
        'Run pagespeed.web.dev on your site — it lists the exact failing items with instructions.');
    } else {
      add('seo', 'Technical SEO basics (Google PageSpeed)', 'na', 0, 0, 'SEO test didn’t complete in time — not counted against you.', '', 'Run it yourself free at pagespeed.web.dev.');
    }
  }

  // --- AI search visibility (15) ---
  if (av && av.configured) {
    const qs = av.queries || [];
    const hits = qs.filter(q => q.appeared).length;
    const total = qs.length;
    const status = hits === 0 ? 'fail' : hits === total ? 'pass' : 'warn';
    const pts = total ? Math.round((15 * hits) / total) : 0;
    const evidence = total <= 1
      ? (av.appeared
          ? `Your business appeared when we asked Perplexity “${(qs[0] && qs[0].query) || ''}”.`
          : `We asked Perplexity “${(qs[0] && qs[0].query) || ''}” — your business didn’t appear.`)
      : (hits === 0
          ? `We ran ${total} live Perplexity searches using your own customer phrases — your business didn’t appear in any of them.`
          : `Your business appeared in ${hits} of ${total} live Perplexity searches of your own customer phrases.`);
    add('aivis', 'Appears in AI search results', status, pts, 15,
      evidence,
      'This is the test that matters: when a buyer asks an AI engine for a recommendation in your market, are you in the answer?',
      'Everything above feeds this — schema, FAQ content, and a complete Google Business Profile are what get you cited. Fix the failed checks and re-run this audit in a few weeks.');
  } else if (av && !av.configured) {
    // check unavailable — leave out entirely
  } else if (state.industry && state.city) {
    add('aivis', 'Appears in AI search results', 'na', 0, 0, 'Still running your search terms through live AI-search queries…', '', '');
  }

  return checks;
}

function scoreFromChecks(checks) {
  let earned = 0, possible = 0, ran = 0;
  checks.forEach(c => {
    if (c.status === 'na') return;
    earned += c.points; possible += c.max; ran += 1;
  });
  const overall = possible > 0 ? Math.round((earned / possible) * 100) : null;
  const grade = overall == null ? null : overall >= 85 ? 'A' : overall >= 70 ? 'B' : overall >= 55 ? 'C' : overall >= 40 ? 'D' : 'F';
  return { overall, grade, earned, possible, ran };
}

function gradeColor(g) {
  return { A:'#3a6f4d', B:'#5b7a5e', C:'#9C6A33', D:'#A86237', F:'#A04324' }[g] || '#9C6A33';
}

function interpret(score, checks) {
  if (score.overall == null) return 'We couldn’t run automated checks without a website — the plan below is where to start.';
  const fails = checks.filter(c => c.status === 'fail').length;
  if (score.overall >= 85) return 'Genuinely rare for a small business site. Your remaining gaps are listed below — they’re refinements, not rescues.';
  if (score.overall >= 70) return 'A solid foundation with a few real gaps. The failed checks below are specific and fixable — most in an afternoon.';
  if (score.overall >= 55) return `You’re partway there. ${fails} checks failed — each one below tells you exactly what we found and how to fix it.`;
  if (score.overall >= 40) return 'AI engines can find your site but can’t make much sense of it. The good news: most of what’s failing is concrete and fixable.';
  return 'Right now AI engines have almost nothing to work with on your site. That’s bad news and good news — every fix below moves the number.';
}

/* ================================================================
   Action plan — failed checks first (with DIY steps), then
   recommendations driven by the pains they selected. Self-serve
   first; the shortcut line mentions the relevant service honestly.
================================================================ */
function buildPlan(checks) {
  const plan = [];

  // 0. No website at all — that's priority one, full stop.
  if (!state.website || state.website.length <= 3) {
    plan.push({
      title: 'Get a real website online',
      why: 'Without a website there’s nothing for AI engines to read, cite, or recommend. Every other fix waits on this one.',
      diy: [
        'You don’t need 20 pages to start — five good ones beat none: home, services, pricing, FAQ, contact.',
        'Pick a platform that allows custom code (you’ll want schema markup later) and state what you do, where, in plain English.',
      ],
      shortcut: 'The AI-Ready Website build starts at $1,200 and handles all of this — structure, content, schema — in about 3–4 weeks.',
    });
  }

  // 1. Highest-value failed checks, in point order
  const failed = checks
    .filter(c => (c.status === 'fail' || c.status === 'warn') && c.max > 0)
    .sort((a, b) => (b.max - b.points) - (a.max - a.points));

  failed.slice(0, 3).forEach(c => {
    plan.push({
      title: 'Fix: ' + c.name,
      why: c.why,
      diy: [c.fix],
      shortcut: c.id.indexOf('schema') === 0 || c.id === 'aivis' || c.id === 'llms'
        ? 'The AI-Ready Website rebuild covers every check on this list — from $1,200, about 3–4 weeks.'
        : null,
    });
  });

  // 2. Pain-driven recommendations — real tools, not just services
  const P = id => state.pains.indexOf(id) !== -1;

  if (P('questions') || P('content')) {
    plan.push({
      title: 'Put your repeated answers to work twice',
      why: 'The questions you answer over and over are exactly what AI engines want on your site. One effort, two payoffs: less repeat work, more AI visibility.',
      diy: [
        'Collect the 10–15 questions your inbox and front desk actually get.',
        'Publish them as a real FAQ page, in plain English, with specific answers (prices, timelines).',
        'Set up a free Claude or ChatGPT account and paste your FAQ in when drafting replies — it answers in your words.',
      ],
      shortcut: 'A Strategy Session ($250–$500) can turn this into a full content plan in 90 minutes.',
    });
  }

  if (P('calls') || P('scheduling')) {
    plan.push({
      title: 'Stop losing the jobs that call after hours',
      why: 'Missed calls and booking friction are usually the cheapest revenue to recover — the customer already wanted you.',
      diy: [
        'Turn on missed-call text-back (many phone providers and Google Business Profile offer this free).',
        'Add online booking — TidyCal, Calendly, or your industry’s scheduler — and link it from your homepage and Google profile.',
        'If call volume is real, look at an AI receptionist service and have it book directly into your calendar.',
      ],
      shortcut: 'I scope and set these up as a Custom AI Build — quote depends on your phone/calendar stack.',
    });
  }

  if (P('data') || P('reporting')) {
    plan.push({
      title: 'Connect the systems you’re re-typing between',
      why: 'Manual re-entry between systems is the most common hidden cost in small businesses — and the most automatable.',
      diy: [
        'Write down the 3 places the same information gets typed twice.',
        'Check Zapier or Make — the connection you need probably already exists as a template.',
        'For reporting: Google Looker Studio (free) can pull your numbers into one live dashboard.',
      ],
      shortcut: 'Custom automation builds typically run $1,500–$5,000 depending on the systems involved.',
    });
  }

  if (P('quotes')) {
    plan.push({
      title: 'Cut quoting from hours to minutes',
      why: 'Proposals are high-leverage AI work: the structure repeats, only the specifics change.',
      diy: [
        'Save your 3 best past proposals as examples.',
        'In Claude, create a Project with those examples plus your price list.',
        'Draft each new quote by describing the job — you edit the 20% that needs your judgment.',
      ],
      shortcut: null,
    });
  }

  if (P('leads')) {
    plan.push({
      title: 'Close the follow-up gap',
      why: 'Most lost leads aren’t lost to competitors — they’re lost to silence. Speed and consistency beat cleverness here.',
      diy: [
        'Set an auto-reply on your contact form / Google profile that promises (and states) a response time.',
        'Pick one place every lead lands — even a free CRM like HubSpot Free — so nothing lives only in someone’s inbox.',
        'Write two follow-up templates (day 2, day 7) and actually send them.',
      ],
      shortcut: null,
    });
  }

  // Fallback if somehow nothing landed
  if (plan.length === 0) {
    plan.push({
      title: 'Book a 30-minute working session',
      why: 'Your checks look strong and you didn’t flag major pain — the next move is deciding which AI bets compound for your specific business.',
      diy: ['Bring your report to a free 30-minute call and we’ll rank your options together.'],
      shortcut: null,
    });
  }

  return plan.slice(0, 5);
}

function submitLead(checks, score, plan) {
  if (state.sendStatus !== 'idle' || !state.email) return;
  state.sendStatus = 'sending';
  const opportunities = plan.map((p, i) => ({
    rank: 'Priority ' + (i + 1),
    title: p.title,
    why: p.why,
    service: p.shortcut || '',
    effort: '', invest: '',
  }));
  fetch('/api/audit-lead', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      name: state.name,
      contactName: state.contactName,
      email: state.email,
      website: state.website,
      industry: state.industry,
      city: state.city,
      keywords: state.keywords,
      pains: state.pains,
      goal: state.goal,
      scores: { overall: score.overall, grade: score.grade, earned: score.earned, possible: score.possible },
      checks: checks.map(c => ({ id: c.id, name: c.name, status: c.status, points: c.points, max: c.max, evidence: c.evidence, fix: c.fix })),
      opportunities,
      actionPlan: plan,
      siteAudit: state.siteAudit && !state.siteAudit.pending ? state.siteAudit : null,
      aiVisibility: state.aiVisibility && !state.aiVisibility.pending ? state.aiVisibility : null,
    }),
  })
    .then(r => { state.sendStatus = r.ok ? 'sent' : 'failed'; updateSendNote(); })
    .catch(() => { state.sendStatus = 'failed'; updateSendNote(); });
}

function updateSendNote() {
  const el = document.getElementById('send-note');
  if (el) el.textContent = sendNoteText();
}
function sendNoteText() {
  if (state.sendStatus === 'sent') return '✓ Report sent to ' + state.email + ' · 30 minutes · No commitment';
  if (state.sendStatus === 'sending') return 'Sending your report to ' + state.email + '…';
  if (state.sendStatus === 'failed') return 'Couldn’t email ' + state.email + ' — but your report is right here.';
  return '30 minutes · No commitment';
}

      </details>`;
    visPanel = `<div class="section-block">
      <span class="vis-badge ${hits > 0 ? 'good' : 'bad'}">${badge}</span>
      <h3>${fromKeywords ? 'We asked Perplexity your own search terms' : `We asked Perplexity: “${esc(qs[0] && qs[0].query || '')}”`}</h3>
      <p class="section-dek">${fromKeywords
        ? `Live queries, run just now, using the exact phrases you said your customers type. Open each one to see the sources the AI engine actually pulled.`
        : 'A live query, run just now — these are the sources the AI engine actually pulled for your market.'}</p>
      <div class="vis-queries">${qs.map(queryBlock).join('')}</div>
      <p style="font-size:14px;color:var(--ink-700)">${hits > 0
        ? 'Your business surfaced — that already puts you ahead of most local competitors. The checklist below is how you keep that position.'
        : 'These are the businesses buyers hear about when they ask AI for a recommendation. The checklist below is what gets you into that answer.'}</p>
    </div>`;
  } else if (state.aiVisibility && state.aiVisibility.pending) {
    const kws = parseKeywords();
    visPanel = `<div class="section-block"><div class="pending"><div class="spinner"></div>${kws.length
      ? `Running ${kws.length} live AI-search quer${kws.length === 1 ? 'y' : 'ies'} from your own search terms… results will appear here.`
      : `Running a live AI-search query for “${esc(state.industry.toLowerCase())} in ${esc(state.city)}”… results will appear here.`}</div></div>`;
  }

  // Site checks panel
  const gradable = checks.filter(c => c.max > 0 || c.status === 'na');
  let checksPanel = '';
  if (state.siteAudit && state.siteAudit.pending) {
    checksPanel = `<div class="section-block"><div class="pending"><div class="spinner"></div>Fetching ${esc(state.website)} and running the site checks — usually 15–45 seconds. The score updates when it lands.</div></div>`;
  } else {
    const sa2 = state.siteAudit && !state.siteAudit.pending ? state.siteAudit : null;
    const platformLine = sa2 && sa2.reachable && (sa2.platform || sa2.hosting)
      ? `<p class="section-dek" style="margin-top:-12px">${[
          sa2.platform ? 'Platform: ' + esc(sa2.platform) : '',
          sa2.hosting ? 'Hosted on: ' + esc(sa2.hosting) : '',
        ].filter(Boolean).join(' · ')} — the fixes below are written for your setup.</p>`
      : '';
    checksPanel = `<div class="section-block">
      <h3>The checklist${state.website ? `: what we found on ${esc(state.website)}` : ''}</h3>
      <p class="section-dek">Every check shows its evidence, its point value, and its fix. Click any row to expand.</p>
      ${platformLine}
      <div class="checks-table">
        ${gradable.map(c => `
          <details class="check-item">
            <summary>
              ${statusIcon(c.status)}
              <span class="check-name">${esc(c.name)}</span>
              <span class="check-pts">${c.status === 'na' ? 'not counted' : c.points + '/' + c.max + ' pts'}</span>
              <span class="check-chevron">▾</span>
            </summary>
            <div class="check-detail">
              <div class="why"><em>${esc(c.evidence)}</em>${c.why ? ' — ' + esc(c.why) : ''}</div>
              ${c.fix ? `<div class="fix"><strong>How to fix it</strong>${esc(c.fix)}</div>` : ''}
            </div>
          </details>`).join('')}
      </div>
    </div>`;
  }

  root.innerHTML = `<div class="fade-in">
    <div class="report-head">
      <p class="eyebrow">Your AI Visibility Report</p>
      <h1>${esc(state.name)}</h1>
      <p class="report-sub">${esc(state.industry)} · ${esc(state.city)}</p>
    </div>

    <div class="score-panel">
      <div class="score-ring-wrap">
        <svg width="140" height="140">
          <circle cx="70" cy="70" r="${r}" fill="none" stroke="#E5DBC9" stroke-width="10"/>
          <circle class="arc" cx="70" cy="70" r="${r}" fill="none" stroke="${color}" stroke-width="10"
            stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
        </svg>
        <div class="score-ring-center">
          <span class="score-ring-num" style="color:${color}">${score.overall == null ? '–' : score.overall}</span>
          <span class="score-ring-grade" style="color:${color}">${score.grade ? 'Grade ' + score.grade : 'no site checks'}</span>
        </div>
      </div>
      <div class="score-copy">
        <p class="eyebrow" style="margin-bottom:6px">AI Visibility Score</p>
        <h2>${score.overall == null ? 'No automated score without a website.' : interpret(score, checks)}</h2>
        <p class="score-basis">${score.overall == null
          ? 'The action plan below is built from what you told us.'
          : `Transparent math: ${score.earned} of ${score.possible} points across ${score.ran} automated checks of your actual site and AI-search presence. Nothing self-reported is scored.`}
        ${pendingAny ? ' Some checks are still running — the score updates automatically.' : ''}</p>
      </div>
    </div>

    ${visPanel}
    ${checksPanel}

    <div style="margin:40px 0 16px;text-align:center">
      <p class="eyebrow">Your action plan</p>
      <h2 style="font-size:clamp(1.7rem,4vw,2.4rem)">Do these, in this order.</h2>
    </div>
    <div class="plan-list">
      ${plan.map((p, i) => `
        <div class="plan-item">
          <span class="plan-num">0${i + 1}</span>
          <h4>${esc(p.title)}</h4>
          <p class="why">${esc(p.why)}</p>
          <div class="plan-diy"><strong>Do it yourself</strong><ul>${p.diy.map(d => `<li>${esc(d)}</li>`).join('')}</ul></div>
          ${p.shortcut ? `<div class="plan-short"><strong>Shortcut</strong>${esc(p.shortcut)}</div>` : ''}
        </div>`).join('')}
    </div>

    <div class="cta-panel">
      <h2>Want a second pair of eyes on this?</h2>
      <p>Book a free 30-minute working session. We’ll walk through your report together, answer questions, and pick the right first move — whether or not you hire me for any of it.</p>
      <a class="cta-btn" href="/ai-audit#book" target="_top">Book your free review call →</a>
      <p class="cta-note" id="send-note">${sendNoteText()}</p>
    </div>

    <div class="restart"><button class="ghost-btn" data-act="restart">← Start over</button></div>
  </div>`;

  // Send the lead once (only after both checks have resolved, or immediately
  // if they can't resolve — we want the emailed report to match the screen).
  if (!pendingAny && state.sendStatus === 'idle') submitLead(checks, score, plan);
}

// ---------------- router ----------------
function render() {
  shell.classList.toggle('wide', state.step === TOTAL_STEPS + 1);
  if (state.step === 0) renderWelcome();
  else if (state.step === 1) renderBasics();
  else if (state.step === 2) renderKeywords();
  else if (state.step === 3) renderPains();
  else if (state.step === 4) renderEmail();
  else renderReport();
  // resize parent iframe politely
  try { parent.postMessage({ auditHeight: document.body.scrollHeight }, '*'); } catch (e) {}
}

document.addEventListener('click', e => {
  const btn = e.target.closest('[data-act]');
  if (!btn) return;
  const act = btn.getAttribute('data-act');
  if (act === 'next') {
    if (state.step === 1) fireSiteCheck();       // site scan: as early as possible
    if (state.step === 2) fireVisibilityCheck(); // Perplexity: needs their search terms
    state.step += 1;
    render();
    window.scrollTo({ top: 0 });
  } else if (act === 'back') {
    state.step = Math.max(0, state.step - 1);
    render();
  } else if (act === 'restart') {
    Object.assign(state, {
      step: 0, name:'', website:'', industry:'', city:'', keywords:'',
      pains: [], goal:'', contactName:'', email:'',
      siteAudit: null, aiVisibility: null, siteFired: false, visFired: false, sendStatus: 'idle',
    });
    render();
    window.scrollTo({ top: 0 });
  }
});

render();
})();
</script>
</body>
</html>
